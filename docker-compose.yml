version: '3.8'

services:
  omi-control-plane:
    build: .
    ports:
      - "8000:8000"
    volumes:
      # Persist the Learning Loop database and native Chroma embeddings
      - ./learning_loop.db:/app/learning_loop.db
      - ./chroma_db:/app/chroma_db
    environment:
      - PYTHONUNBUFFERED=1
      - OMI_DATABASE_URL=postgresql://omi_admin:omi_password@telemetry-db:5432/omi_telemetry
    depends_on:
      - telemetry-db
    restart: always

  telemetry-db:
    image: postgres:15
    environment:
      POSTGRES_DB: omi_telemetry
      POSTGRES_USER: omi_admin
      POSTGRES_PASSWORD: omi_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:

