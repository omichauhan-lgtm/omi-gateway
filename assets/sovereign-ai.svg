<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Sovereign AI alignment visual</title>
  <desc id="desc">OMI sovereign AI controls for data residency, Indic language support, auditability, and funding evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#09111f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff9933"/>
      <stop offset=".5" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#138808"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity=".30"/>
    </filter>
    <style>
      .heading { font: 850 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .sub { font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .cardTitle { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; }
      .body { font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #a7b6c9; }
      .tag { font: 800 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; letter-spacing: .8px; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="24" fill="url(#bg)"/>
  <path d="M70 92 H1130" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <text x="70" y="58" class="heading">Sovereign AI Reliability Plane</text>
  <text x="70" y="124" class="sub">Policy-aware routing, Indic evaluation, audit lineage, and public evidence for grant and pilot readiness.</text>

  <g transform="translate(70 174)" filter="url(#shadow)">
    <rect width="246" height="168" rx="20" fill="#0f172a" stroke="#334155"/>
    <rect width="246" height="7" rx="3.5" fill="#ff9933"/>
    <text x="24" y="48" class="cardTitle">Data Residency</text>
    <text x="24" y="82" class="body">Sovereignty tags influence</text>
    <text x="24" y="104" class="body">provider selection and route</text>
    <text x="24" y="126" class="body">boundaries.</text>
    <rect x="24" y="136" width="134" height="22" rx="11" fill="#3a2410"/>
    <text x="40" y="151" class="tag">BOUNDARY CHECKS</text>
  </g>

  <g transform="translate(348 174)" filter="url(#shadow)">
    <rect width="246" height="168" rx="20" fill="#0f172a" stroke="#334155"/>
    <rect width="246" height="7" rx="3.5" fill="#38bdf8"/>
    <text x="24" y="48" class="cardTitle">Indic Support</text>
    <text x="24" y="82" class="body">Multilingual datasets cover</text>
    <text x="24" y="104" class="body">regional prompts and</text>
    <text x="24" y="126" class="body">translation safety checks.</text>
    <rect x="24" y="136" width="138" height="22" rx="11" fill="#0d2f44"/>
    <text x="40" y="151" class="tag">MULTILINGUAL</text>
  </g>

  <g transform="translate(626 174)" filter="url(#shadow)">
    <rect width="246" height="168" rx="20" fill="#0f172a" stroke="#334155"/>
    <rect width="246" height="7" rx="3.5" fill="#14b8a6"/>
    <text x="24" y="48" class="cardTitle">Auditability</text>
    <text x="24" y="82" class="body">Admin actions, policy</text>
    <text x="24" y="104" class="body">mutations, and evidence</text>
    <text x="24" y="126" class="body">artifacts are logged.</text>
    <rect x="24" y="136" width="120" height="22" rx="11" fill="#10352f"/>
    <text x="40" y="151" class="tag">LINEAGE</text>
  </g>

  <g transform="translate(904 174)" filter="url(#shadow)">
    <rect width="246" height="168" rx="20" fill="#0f172a" stroke="#334155"/>
    <rect width="246" height="7" rx="3.5" fill="#138808"/>
    <text x="24" y="48" class="cardTitle">Funding Evidence</text>
    <text x="24" y="82" class="body">Reports and public APIs</text>
    <text x="24" y="104" class="body">support grants, pilots, and</text>
    <text x="24" y="126" class="body">public-sector diligence.</text>
    <rect x="24" y="136" width="126" height="22" rx="11" fill="#11331e"/>
    <text x="40" y="151" class="tag">DOSSIERS</text>
  </g>
</svg>
