<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10" />
      <stop offset="100%" stop-color="#040507" />
    </linearGradient>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="520" fill="url(#bg)" rx="8" />

  <!-- Grid Pattern -->
  <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240 M 0,280 L 800,280 M 0,320 L 800,320 M 0,360 L 800,360 M 0,400 L 800,400 M 0,440 L 800,440 M 0,480 L 800,480" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M 80,0 L 80,520 M 160,0 L 160,520 M 240,0 L 240,520 M 320,0 L 320,520 M 400,0 L 400,520 M 480,0 L 480,520 M 560,0 L 560,520 M 640,0 L 640,520 M 720,0 L 720,520" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.2" />

  <!-- Flow Lines (Arrows) -->
  <g stroke="#4b5563" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M 170,80 L 250,80" />
    <path d="M 380,80 L 460,80" />
    <path d="M 590,80 L 670,80" />
    <path d="M 720,110 L 720,190" />
    <path d="M 670,220 L 590,220" />
    <path d="M 460,220 L 380,220" />
    <path d="M 250,220 L 170,220" />
    
    <!-- Arrowheads -->
    <polygon points="250,80 244,76 244,84" fill="#4b5563" stroke="none" />
    <polygon points="460,80 454,76 454,84" fill="#4b5563" stroke="none" />
    <polygon points="670,80 664,76 664,84" fill="#4b5563" stroke="none" />
    <polygon points="720,190 716,184 724,184" fill="#4b5563" stroke="none" />
    <polygon points="590,220 596,216 596,224" fill="#4b5563" stroke="none" />
    <polygon points="380,220 386,216 386,224" fill="#4b5563" stroke="none" />
    <polygon points="170,220 176,216 176,224" fill="#4b5563" stroke="none" />
  </g>

  <!-- Flow Lines (Return Route) -->
  <g stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M 110,190 L 110,130" stroke-dasharray="4 4" />
    <!-- Arrowhead -->
    <polygon points="110,130 106,136 114,136" fill="#10b981" stroke="none" />
  </g>

  <!-- Layer 1: Client Application -->
  <g transform="translate(40, 50)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <rect width="130" height="4" fill="url(#primaryGrad)" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">Client Application</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Sends prompt &amp; policy</text>
  </g>

  <!-- Layer 2: Router (Complexity classifier) -->
  <g transform="translate(250, 50)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <rect width="130" height="4" fill="url(#primaryGrad)" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">1. Control Plane Router</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Complexity Classifier</text>
  </g>

  <!-- Layer 3: Reliability Plane (Cache check) -->
  <g transform="translate(460, 50)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#3b82f6" stroke-width="1.5" />
    <rect width="130" height="4" fill="#3b82f6" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">2. Reliability Layer</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Semantic Cache Check</text>
  </g>

  <!-- Layer 4: Calibration Plane (Uncertainty) -->
  <g transform="translate(670, 50)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#06b6d4" stroke-width="1.5" />
    <rect width="130" height="4" fill="#06b6d4" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">3. Calibration Layer</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Wilson CI Bounds</text>
  </g>

  <!-- Layer 5: Governance Plane -->
  <g transform="translate(670, 190)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#f59e0b" stroke-width="1.5" />
    <rect width="130" height="4" fill="#f59e0b" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">4. Governance Layer</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Complexity &amp; Spend Budget</text>
  </g>

  <!-- Layer 6: Intelligence Plane (RAG & Shadow) -->
  <g transform="translate(460, 190)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#8b5cf6" stroke-width="1.5" />
    <rect width="130" height="4" fill="#8b5cf6" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">5. Intelligence Layer</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Chroma DB RAG / Shadow</text>
  </g>

  <!-- Layer 7: LLM Provider Committee -->
  <g transform="translate(250, 190)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#ec4899" stroke-width="1.5" />
    <rect width="130" height="4" fill="#ec4899" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">6. LLM Providers</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Sarvam-1 / Claude / GPT</text>
  </g>

  <!-- Layer 8: Judge & Outcome Verification -->
  <g transform="translate(40, 190)" filter="url(#shadow)">
    <rect width="130" height="60" rx="6" fill="#111827" stroke="#10b981" stroke-width="1.5" />
    <rect width="130" height="4" fill="#10b981" rx="2" />
    <text x="65" y="28" font-family="-apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ffffff" text-anchor="middle">7. Judge &amp; Verification</text>
    <text x="65" y="44" font-family="-apple-system, sans-serif" font-size="9" font-weight="500" fill="#9ca3af" text-anchor="middle">Outcome Grounding</text>
  </g>

  <!-- Bottom Panel: Dynamic Feedback loops (Visual Moat) -->
  <g transform="translate(40, 290)">
    <rect width="720" height="190" rx="8" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <text x="25" y="30" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">OMI Continuous Learning Loop (Evidence Moat)</text>
    
    <!-- Left Card: ECE Anomaly Trigger -->
    <g transform="translate(25, 55)">
      <rect width="210" height="110" rx="6" fill="#030712" stroke="#e11d48" stroke-width="1" />
      <text x="15" y="25" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Calibration Drift Event</text>
      <text x="15" y="45" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">If actual accuracy drops below</text>
      <text x="15" y="60" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">Wilson bounds, LLMs are flagged.</text>
      <rect x="15" y="75" width="105" height="20" rx="4" fill="#e11d48" fill-opacity="0.1" />
      <text x="22" y="88" font-family="-apple-system, sans-serif" font-size="8.5" font-weight="700" fill="#e11d48">AUTO-QUARANTINE</text>
    </g>

    <!-- Center Card: Value Economics -->
    <g transform="translate(255, 55)">
      <rect width="210" height="110" rx="6" fill="#030712" stroke="#10b981" stroke-width="1" />
      <text x="15" y="25" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Economic Optimization</text>
      <text x="15" y="45" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">Estimates spent complexity vs</text>
      <text x="15" y="60" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">cheap model cost avoidance.</text>
      <rect x="15" y="75" width="105" height="20" rx="4" fill="#10b981" fill-opacity="0.1" />
      <text x="22" y="88" font-family="-apple-system, sans-serif" font-size="8.5" font-weight="700" fill="#10b981">MAXIMIZE VALUE</text>
    </g>

    <!-- Right Card: Pilot Funnel Qualification -->
    <g transform="translate(485, 55)">
      <rect width="210" height="110" rx="6" fill="#030712" stroke="#06b6d4" stroke-width="1" />
      <text x="15" y="25" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">Autonomous Operations Engine</text>
      <text x="15" y="45" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">Auto-compiles monthly reports</text>
      <text x="15" y="60" font-family="-apple-system, sans-serif" font-size="9.5" fill="#9ca3af">and logs sovereign pipeline audit.</text>
      <rect x="15" y="75" width="105" height="20" rx="4" fill="#06b6d4" fill-opacity="0.1" />
      <text x="22" y="88" font-family="-apple-system, sans-serif" font-size="8.5" font-weight="700" fill="#06b6d4">QUALIFY HOT LEADS</text>
    </g>
  </g>
</svg>
