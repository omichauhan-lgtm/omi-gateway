<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10" />
      <stop offset="100%" stop-color="#040507" />
    </linearGradient>
    <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9933" stop-opacity="0.15" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#138808" stop-opacity="0.15" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff9933" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#138808" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" fill="url(#bg)" rx="8" />
  
  <!-- Flag Gradient Accent Overlay -->
  <rect width="800" height="320" fill="url(#flagGrad)" rx="8" />

  <!-- Grid Pattern -->
  <path d="M 0,40 L 800,40 M 0,80 L 800,80 M 0,120 L 800,120 M 0,160 L 800,160 M 0,200 L 800,200 M 0,240 L 800,240 M 0,280 L 800,280" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.2" />
  <path d="M 80,0 L 80,320 M 160,0 L 160,320 M 240,0 L 240,320 M 320,0 L 320,320 M 400,0 L 400,320 M 480,0 L 480,320 M 560,0 L 560,320 M 640,0 L 640,320 M 720,0 L 720,320" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.2" />

  <text x="30" y="35" font-family="-apple-system, sans-serif" font-size="14" font-weight="700" fill="#ffffff">Sovereign Compliance &amp; Alignment Matrix</text>
  <line x1="30" y1="45" x2="350" y2="45" stroke="url(#accent)" stroke-width="2" />

  <!-- Card 1: Data Residency Boundary -->
  <g transform="translate(30, 70)" filter="url(#shadow)">
    <rect width="230" height="210" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <rect width="230" height="4" fill="#ff9933" rx="2" />
    <text x="20" y="30" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">1. Data Residency Boundary</text>
    
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Hard sovereignty routing checks</text>
    <text x="20" y="80" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Isolation of public DPI queries</text>
    <text x="20" y="100" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Prevents traffic from crossing borders</text>
    
    <!-- Boundary status indicator -->
    <rect x="20" y="135" width="190" height="50" rx="4" fill="#030712" stroke="#ff9933" stroke-width="0.5" />
    <circle cx="35" cy="160" r="5" fill="#ff9933" />
    <text x="50" y="158" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Sovereign Isolation Layer</text>
    <text x="50" y="172" font-family="-apple-system, sans-serif" font-size="8.5" fill="#9ca3af">Active Compliance Plane</text>
  </g>

  <!-- Card 2: Multilingual Indic Adaptors -->
  <g transform="translate(285, 70)" filter="url(#shadow)">
    <rect width="230" height="210" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <rect width="230" height="4" fill="#ffffff" rx="2" />
    <text x="20" y="30" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">2. Multilingual Indic Adaptors</text>
    
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Native adapters for Sarvam-1</text>
    <text x="20" y="80" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Dialect routing &amp; translation check</text>
    <text x="20" y="100" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Tokenizer cost tracking</text>
    
    <!-- Tokenizer stats -->
    <rect x="20" y="135" width="190" height="50" rx="4" fill="#030712" stroke="#e2e8f0" stroke-width="0.5" />
    <text x="35" y="158" font-family="-apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff">3.1x Compression</text>
    <text x="35" y="172" font-family="-apple-system, sans-serif" font-size="8.5" fill="#9ca3af">Indic Tokenizer Efficiency</text>
  </g>

  <!-- Card 3: IndiaAI & MeitY Audits -->
  <g transform="translate(540, 70)" filter="url(#shadow)">
    <rect width="230" height="210" rx="6" fill="#111827" stroke="#1f2937" stroke-width="1.5" />
    <rect width="230" height="4" fill="#138808" rx="2" />
    <text x="20" y="30" font-family="-apple-system, sans-serif" font-size="12" font-weight="700" fill="#ffffff">3. Policy Audits</text>
    
    <text x="20" y="60" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Alignment with IndiaAI initiatives</text>
    <text x="20" y="80" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Compliance with MeitY guidelines</text>
    <text x="20" y="100" font-family="-apple-system, sans-serif" font-size="10" fill="#9ca3af">• Strict auditability frameworks</text>
    
    <!-- Compliance verification badge -->
    <rect x="20" y="135" width="190" height="50" rx="4" fill="#030712" stroke="#138808" stroke-width="0.5" />
    <circle cx="35" cy="160" r="5" fill="#138808" />
    <text x="50" y="158" font-family="-apple-system, sans-serif" font-size="9" font-weight="700" fill="#ffffff">Policy Compliance</text>
    <text x="50" y="172" font-family="-apple-system, sans-serif" font-size="8.5" fill="#138808">Verified Audit Lineage Logs</text>
  </g>
</svg>
