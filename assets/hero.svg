<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0c10" />
      <stop offset="50%" stop-color="#050608" />
      <stop offset="100%" stop-color="#020304" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" />

  <!-- Background Grid Lines -->
  <path d="M 0,50 L 800,50 M 0,100 L 800,100 M 0,150 L 800,150 M 0,200 L 800,200 M 0,250 L 800,250" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.3" />
  <path d="M 100,0 L 100,300 M 200,0 L 200,300 M 300,0 L 300,300 M 400,0 L 400,300 M 500,0 L 500,300 M 600,0 L 600,300 M 700,0 L 700,300" stroke="#1f2937" stroke-width="0.5" stroke-opacity="0.3" />

  <!-- Soft Ambient Glow behind Text -->
  <circle cx="400" cy="150" r="100" fill="#06b6d4" fill-opacity="0.08" filter="url(#softGlow)" />
  <circle cx="400" cy="150" r="80" fill="#4f46e5" fill-opacity="0.05" filter="url(#softGlow)" />

  <!-- Abstract Network Nodes & Edges (AI Routing concept) -->
  <g opacity="0.35">
    <!-- Lines -->
    <line x1="80" y1="80" x2="220" y2="150" stroke="#4f46e5" stroke-width="1" />
    <line x1="220" y1="150" x2="160" y2="240" stroke="#06b6d4" stroke-width="1.5" />
    <line x1="160" y1="240" x2="80" y2="80" stroke="#374151" stroke-width="1" />
    <line x1="220" y1="150" x2="350" y2="80" stroke="#374151" stroke-width="1" />
    
    <line x1="720" y1="80" x2="580" y2="150" stroke="#10b981" stroke-width="1.5" />
    <line x1="580" y1="150" x2="640" y2="240" stroke="#06b6d4" stroke-width="1" />
    <line x1="640" y1="240" x2="720" y2="80" stroke="#374151" stroke-width="1" />
    <line x1="580" y1="150" x2="450" y2="80" stroke="#374151" stroke-width="1" />

    <!-- Left Group Nodes -->
    <circle cx="80" cy="80" r="5" fill="#4f46e5" />
    <circle cx="220" cy="150" r="8" fill="#06b6d4" />
    <circle cx="160" cy="240" r="6" fill="#374151" />
    <circle cx="350" cy="80" r="4" fill="#374151" />

    <!-- Right Group Nodes -->
    <circle cx="720" cy="80" r="6" fill="#10b981" />
    <circle cx="580" cy="150" r="8" fill="#06b6d4" />
    <circle cx="640" cy="240" r="5" fill="#374151" />
    <circle cx="450" cy="80" r="4" fill="#374151" />
  </g>

  <!-- Central Brand Icon & Text -->
  <g transform="translate(400, 110)" text-anchor="middle">
    <!-- Brand Icon -->
    <g transform="translate(0, -35)">
      <!-- Outer Hexagon -->
      <polygon points="-24,-14 -24,14 0,28 24,14 24,-14 0,-28" fill="url(#nodeGrad)" stroke="url(#glow)" stroke-width="2" filter="url(#blur)" />
      <!-- Inner Core -->
      <circle cx="0" cy="0" r="10" fill="url(#glow)" />
      <!-- Orbiting Particle -->
      <circle cx="15" cy="-8" r="3" fill="#ffffff" />
    </g>
    
    <!-- Title -->
    <text x="0" y="25" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="4">OMI GATEWAY</text>
    
    <!-- Tagline / Subtitle -->
    <text x="0" y="55" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="500" fill="#9ca3af" letter-spacing="2">TRUST LAYER FOR SOVEREIGN AI SYSTEMS</text>

    <!-- Small decorative pill badge -->
    <rect x="-65" y="70" width="130" height="20" rx="10" fill="#111827" stroke="#1f2937" stroke-width="1" />
    <circle cx="-48" cy="80" r="3.5" fill="#10b981" />
    <text x="8" y="84" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9.5" font-weight="600" fill="#10b981" letter-spacing="1">OPERATIONALLY VERIFIED</text>
  </g>
</svg>
