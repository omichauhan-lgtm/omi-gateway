name: Deploy to Production

on:
  push:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Lint check
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          python -c "import main; print('✅ Syntax OK')"

      - name: Seed Telemetry and Scientific Proofs
        run: |
          python scripts/calibration_scientific_proof.py
          python scripts/longitudinal_sim.py

      - name: Run CI/CD Governance Infrastructure Gate
        env:
          OMI_ADMIN_KEY: "ci_test_key"
        run: |
          # Start server in background for testing
          export OMI_ADMIN_KEY="ci_test_key"
          python -m uvicorn api.main:app --port 8000 &
          sleep 10
          python scripts/ci_governance_gate.py
          python evals/regression_suite.py




